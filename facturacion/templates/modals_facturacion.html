<!-- Modal: Buscar Productos (Elite) -->
<div id="products-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius:16px; overflow:hidden;">
            <div class="modal-header bg-light border-0 p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                        style="width:48px; height:48px; font-size:1.25rem; background: var(--accent) !important;"><i class="fas fa-search"></i></div>
                    <div>
                        <h4 class="modal-title fw-bold m-0" style="color: var(--text-primary)">Explorador de Inventario</h4>
                        <p class="text-muted small m-0">Búsqueda avanzada de productos y servicios</p>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="close-products-modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="search-field mb-4" style="position: relative;">
                    <i class="fas fa-filter" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--accent);"></i>
                    <input type="text" id="modal-product-search" class="form-control"
                        style="padding-left:2.8rem; height:50px; border-radius:12px; border: 1px solid var(--border-subtle);"
                        placeholder="Escriba código, nombre o categoría...">
                </div>
                <div style="max-height:400px; overflow-y:auto; border-radius:12px; border:1px solid var(--border-subtle);">
                    <table class="table table-hover m-0">
                        <thead class="bg-light sticky-top">
                            <tr>
                                <th style="font-size:0.7rem; text-transform:uppercase; color: var(--text-muted);">Código</th>
                                <th style="font-size:0.7rem; text-transform:uppercase; color: var(--text-muted);">Producto</th>
                                <th style="font-size:0.7rem; text-transform:uppercase; color: var(--text-muted);">Stock</th>
                                <th style="font-size:0.7rem; text-transform:uppercase; text-align:right; color: var(--text-muted);">Precio</th>
                            </tr>
                        </thead>
                        <tbody id="products-list">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Seleccionar Cliente (Enterprise) -->
<div id="client-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius:16px;">
            <div class="modal-header border-0 p-4 pb-0">
                <div>
                    <h4 class="fw-bold m-0" style="color: var(--text-primary)">Directorio Institucional</h4>
                    <p class="text-muted small m-0">Vincular operación a una entidad registrada</p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="close-client-modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="d-flex gap-2 mb-4">
                    <button class="btn btn-outline-primary active w-100 tab" data-tab="clients" style="border-radius: 10px; font-weight: 600;">Clientes</button>
                    <button class="btn btn-outline-primary w-100 tab" data-tab="suppliers" style="border-radius: 10px; font-weight: 600;">Proveedores</button>
                </div>
                <div class="search-field mb-4" style="position: relative;">
                    <i class="fas fa-user-tag" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--accent);"></i>
                    <input type="text" id="client-search" class="form-control"
                        style="padding-left:2.8rem; height:50px; border-radius:12px; border: 1px solid var(--border-subtle);"
                        placeholder="Buscar por RNC/Cédula o Nombre...">
                </div>
                <div id="clients-tab" class="tab-content active">
                    <div id="clients-list" class="row g-3" style="max-height:350px; overflow-y:auto; padding: 0.5rem;">
                        <!-- Injected by JS -->
                    </div>
                </div>
                <div id="suppliers-tab" class="tab-content hidden">
                    <div id="suppliers-list" class="row g-3" style="max-height:350px; overflow-y:auto; padding: 0.5rem;">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Confirmar Pago (Elite) -->
<div id="payment-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-2xl" style="border-radius:24px;">
            <div class="modal-body p-5 text-center">
                <div class="mb-4">
                    <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width:80px; height:80px; font-size:2.5rem; background: var(--success) !important; box-shadow:0 10px 20px rgba(16,185,129,0.2);">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <h3 class="fw-bold" style="color: var(--text-primary)">Cierre de Operación</h3>
                    <p class="text-muted">Procesando recaudo en efectivo</p>
                </div>

                <div class="bg-light p-4 rounded-4 mb-4 text-start" style="background: var(--bg-deep) !important; border-radius: 16px;">
                    <div class="d-flex justify-content-between mb-3 border-bottom pb-3" style="border-color: var(--border-subtle) !important;">
                        <span class="fw-bold text-muted uppercase" style="font-size:0.75rem;">Total a Recibir:</span>
                        <span class="fs-4 fw-black text-primary" id="modal-total" style="color: var(--accent) !important; font-weight: 900;">RD$ 0.00</span>
                    </div>

                    <label class="fw-bold text-muted uppercase mb-2" style="font-size:0.75rem;">Monto Entregado:</label>
                    <div class="input-group input-group-lg mb-3">
                        <span class="input-group-text bg-white border-end-0 text-success fw-bold"
                            style="border-radius:12px 0 0 12px; border-color: var(--border-subtle); color: var(--success) !important;">RD$</span>
                        <input type="text" id="amount-received" class="form-control border-start-0 text-end fw-black"
                            style="border-radius:0 12px 12px 0; border-color: var(--border-subtle); font-weight: 900;" placeholder="0.00">
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-info uppercase" style="font-size:0.75rem; color: #0ea5e9 !important;">Cambio para el Cliente:</span>
                        <span class="fs-4 fw-black text-info" id="modal-change" style="color: #0ea5e9 !important; font-weight: 900;">RD$ 0.00</span>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg fw-bold py-3" id="confirm-payment" disabled
                        style="border-radius:12px; background: var(--accent) !important; border: none; font-size: 1rem;">
                        <i class="fas fa-print me-2"></i> Finalizar y Emitir Comprobante
                    </button>
                    <button class="btn btn-link text-muted fw-bold" data-bs-dismiss="modal" style="text-decoration: none;">Cancelar (ESC)</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .tab-content.hidden { display: none; }
    .client-card-elite {
        background: #fff;
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 1rem;
        cursor: pointer;
        transition: var(--transition);
        height: 100%;
    }
    .client-card-elite:hover {
        border-color: var(--accent);
        background: var(--bg-deep);
        transform: translateY(-2px);
    }
    .client-card-elite.active {
        border-color: var(--accent);
        background: var(--accent-glow);
    }
    .fw-black { font-weight: 900; }
    
    /* Bootstrap compatibility tweaks for our premium theme */
    .btn-outline-primary {
        color: var(--accent);
        border-color: var(--accent);
    }
    .btn-outline-primary:hover, .btn-outline-primary.active {
        background-color: var(--accent) !important;
        border-color: var(--accent) !important;
        color: #fff !important;
    }
</style>
