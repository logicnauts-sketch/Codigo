{% extends "admin/config_base.html" %}

{% block config_content %}
<div class="config-header d-flex justify-content-between align-items-center mb-4">
    <span class="group-title m-0">Gestión de Medidas y Dimensiones</span>
    <button type="button" class="btn btn-primary btn-sm" onclick="abrirModalUnidad()">
        <i class="fas fa-plus"></i> Nueva Unidad
    </button>
</div>

<div class="config-alert mb-4">
    <i class="fas fa-info-circle"></i>
    <div class="config-alert-text">
        Las unidades con <b>Fórmula Proporcional</b> activada permitirán calcular el precio basado en dimensiones (Ej:
        Alto x Ancho) en el punto de venta.
    </div>
</div>

<div class="table-responsive">
    <table class="table" id="tablaUnidades">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Abrev.</th>
                <th>Usa Fórmula</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody id="unidadesListBody">
            <!-- Dinámico -->
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof loadUnidades === 'function') loadUnidades();
    });
</script>
{% endblock %}
